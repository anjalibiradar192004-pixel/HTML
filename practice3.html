<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <style>
        .container {
            width: 100%;
            height: 200px;
            padding: 5px;

            display: grid;
            border: 2px solid black;
            gap: 10px;
            
        }
        .container div {
            padding: 1opx;
            border: 2px solid black;
            align-items: center;
            background-color: antiquewhite;
            text-align: center;
        }
        .item1 {
            
            grid-column-start: 1;
            grid-column-end: 4;
            
        }
        .item2 {
            
            grid-row-start: 2;
            grid-row-end: 4;

        }
        .item3 {
          
            grid-row-start: 2;
            grid-row-end: 4;  
        }
        .item6 {
             
            grid-column-start: 1;
            grid-column-end: 4;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1">Header/companey logo</div>
        <div class="item2">
            <nav>
            <a href="#">link1</a>
            <a href="#">link2</a>
            <a href="#">link3</a>
            </nav>
        </div>
        <div class="item3">Content area</div>
        <div class="item4">Ads</div> 
        <div class="item5">Sidebar 5</div>
        <div class="item6">footer</div>
    </div>
</body>
</html>

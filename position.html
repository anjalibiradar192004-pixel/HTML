<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cssposition</title>
    <style>
        div#static {
            position: static;
            height: 100px;
            width: 100px;
            background-color: aqua;
            border: 2px black;
            left: 100px;
        }
        div#rel {
            position: relative;
            height: 100px;
            width: 100px;
            background-color: brown;
            border: 2px black;
            left: 100px;
        }
        div#parent{
            position: relative;
            height: 200px;
            width: 200px;
            background-color: palevioletred;

        }
        div#child{
            position: absolute;
            height: 50px;
            width: 50px;
            background-color: blue;
            border: 2px solid yellowgreen;
            left: 50px;
            top: 20px;
            
        }
    </style>
</head>
<body>
    <div id="static">Static div</div>
    <div id="rel">relative div</div>
    <div id="parent">
        <div id="child">child div</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <style>
        .container{
            width: 100%;
            height: 100px;
            background-color: aqua;
            padding: 10px;
            display: grid;
            grid-template-columns: auto auto 200px;
            gap: 5px;
            /* grid-template-rows: auto auto 200px; */
        }
        .container div{
            border: 2px solid red;
            background-color: blue;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Pattern</h2>
    <br>
    <br>
    <form>
        <label for="un">Username:</label>
        <input type="text" id="un" name="username" pattern="^[A-Z]{1}[a-z]{2,10}$" text="Enter username" pattern="Abc">
        <br>
        <br>
        <label for="phn">Phone number:</label>
        <input type="tel" id="phn" name="phone" pattern="^\+91[6-9]{1}\d{2}-\d{3}-\d{4}$" title="Enter your number" pattern="389-589-9804">
        </label>
        <br>
        <br>
        <label for="psw">Password</label>
        <input type="text" id="psw" name="Password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*@$!%&#?)(A-Za-z\d){8,}$">
        <br>
        <br>
        <label for="eml">Email:</label>
        <input type="email" id="eml" name="email" pattern="^[A-Za-z\d/._/-] + @ [A-Za-z]+/.[A-Za-z]{2,}$">
        <br>
        <br>
        <button type="submit">Submit</button>
    </form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <style>
        .container{
            display: grid;
            padding: 5px;
            background-color: aqua;
            border: 4px solid black;
        }
        .container div{
            padding: 10px;
           text-align: center;
            background-color: palevioletred;
            border: 2px solid yellow;
            font-size: 30px;
        }
        .item1 {
            grid-column-start: 1;
            grid-column-end: 3;
        }
        .item2 {
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .item5 {
            grid-column-start: 1;
            grid-column-end: 3;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="item1">Header</div>
    <div class="item2">Sideber</div>
    <div class="item3">item 3</div>
    <div class="item4">item 4</div>
    <div class="item5">Footer</div>
    
   
    </div>
    
</body>
</html>

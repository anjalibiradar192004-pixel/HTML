<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box sizing in html</title>
    <style>
        * {
            margin: 0px;
        }
        .nb{
            height: 100px;
            width: 100px;
            padding: 10px;
            border: 3px solid palegreen;
            margin: 5px;
            box-sizing: content-box;
        }
        .cb{
            height: 100px;
            width: 100px;
            padding: 10px;
            border: 3px solid palegreen;
            margin: 5px;
            box-sizing: content-box;
        }
        .bb{
            height: 100px;
            width: 100px;
            padding: 5px;
            border: 3px solid palegreen;
            margin: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>Box sizing</h1>
    <div class="nb">Normal box</div>
    <div class="cb">Content box</div>
    <div class="bb">Boarder box</div>
</body>
</html>
